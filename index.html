<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<!-- Loading Screen -->
<div id="loader">

    <h1>Loading Something Special...</h1>

</div>

<!-- Background Stars -->
<div id="stars"></div>

<!-- Floating Hearts -->
<div class="hearts">

<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>
<span>❤</span>

</div>

<!-- Main Container -->
<div class="container">

<h2>Happy Birthday</h2>

<h1>Dear ______ ❤️</h1>

<p>

I couldn't celebrate this special day beside you,

so I created a little place where we can

celebrate together.

Every page here contains a memory,

a smile,

and a small part of my heart.

</p>

<button onclick="startJourney()">

Begin Our Journey ✨

</button>

</div>

<!-- Music Button -->

<button id="musicBtn">

🎵

</button>

<!-- Background Music -->

<audio id="bgMusic" loop>

<source src="music/song.mp3" type="audio/mp3">

</audio>

<script src="js/main.js"></script>

</body>
</html>
